name: 手动构建固件 (lean)

# 相比 lvcdy 原版 manual-build.yml 多做两件事:
#   1) 自动打 board 名补丁:SUPPORTED_DEVICES += econet,xr1710g-ubi
#      → 让新镜像能干净 sysupgrade 到当前 econet,xr1710g-ubi 设备(首刷免 -F)
#   2) STRIP_OPENCLASH 开关:true 时编译期去掉 luci-app-openclash(极简)
#
# 用法:传到你 fork 的 .github/workflows/ 下 → Actions → 选本 workflow → Run。

on:
  workflow_dispatch:
    inputs:
      device:
        description: 选择要构建的设备
        required: true
        type: choice
        default: gemtek_xr1710g-ubi
        options:
          - gemtek_xr1710g-ubi
          - gemtek_w1700k-ubi
          - gemtek_xg2010g-ubi
          - nokia_valyrian
          - nokia_xg-040g-md
          - airoha_an7581-evb
          - airoha_an7581-evb-emmc
      strip_openclash:
        description: 去掉 OpenClash(极简;默认保留)
        required: false
        type: boolean
        default: false

concurrency:
  group: manual-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      DEBIAN_FRONTEND: noninteractive
      DEVICE: ${{ inputs.device }}
      DL_DIR: ${{ github.workspace }}/dl
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 释放磁盘空间
        run: |
          set -uxo pipefail
          echo "==== 清理前 ===="; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          echo "==== 清理后 ===="; df -h /

      - name: 修复脚本权限
        run: |
          set -euxo pipefail
          # 把 scripts/ 下所有文件加 +x —— 覆盖无扩展名脚本(ipkg-remove/ipkg-build 等),
          # 否则 apk 打包阶段调用它们会 Permission denied (Error 126)。对数据文件加 +x 无害。
          find scripts -type f -exec chmod +x {} +
          chmod +x config/check-*.sh || true

      # ---- 新增:board 名补丁(仅对 xr1710g 生效) ----
      - name: 打 econet board 名补丁
        if: ${{ inputs.device == 'gemtek_xr1710g-ubi' }}
        run: |
          set -euxo pipefail
          MK=target/linux/airoha/image/an7581.mk
          # 在 xr1710g 的 chainloader ARTIFACT 行后插入 SUPPORTED_DEVICES(该行唯一锚定 xr1710g)
          sed -i '/ARTIFACT\/chainload-uboot.itb := an7581-chainloader gemtek_xr1710g$/a\  SUPPORTED_DEVICES += econet,xr1710g-ubi' "$MK"
          echo "---- 补丁后确认 ----"
          grep -n "econet,xr1710g-ubi" "$MK" || { echo "补丁未生效,请检查 an7581.mk 结构是否变化"; exit 1; }

      # ---- 新增(可选):去掉 OpenClash ----
      - name: 去掉 OpenClash
        if: ${{ inputs.strip_openclash == true }}
        run: |
          set -euxo pipefail
          sed -i 's/ luci-app-openclash//' target/linux/airoha/image/an7581.mk
          echo "已从 DEVICE_PACKAGES 去除 luci-app-openclash"

      - name: 安装依赖
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison ccache clang curl fastjar flex gawk gettext \
            git gcc-multilib g++-multilib libelf-dev libncurses5-dev libssl-dev \
            libpython3-dev patch pkg-config python3 python3-distutils python3-pip \
            python3-setuptools qemu-utils rsync subversion swig unzip vim wget \
            xsltproc zlib1g-dev zstd
          python3 -m pip install --upgrade pip
          python3 -m pip install pyelftools

      - name: 缓存下载文件与 ccache
        uses: actions/cache@v4
        with:
          path: |
            dl
            .ccache
          key: ${{ runner.os }}-openwrt-${{ inputs.device }}-${{ hashFiles('feeds.conf.default', 'target/linux/airoha/**', 'package/emortal/**') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ inputs.device }}-

      - name: 更新 feeds
        run: |
          set -euxo pipefail
          perl ./scripts/feeds update -a
          perl ./scripts/feeds install -a

      - name: 生成配置
        run: |
          set -euxo pipefail
          DEVICE_CONFIG=${DEVICE//-/_}
          printf '%s\n' \
            'CONFIG_TARGET_airoha=y' \
            'CONFIG_TARGET_airoha_an7581=y' \
            "CONFIG_TARGET_airoha_an7581_DEVICE_${DEVICE_CONFIG}=y" \
            'CONFIG_CCACHE=y' > .config
          make defconfig
          grep "^CONFIG_TARGET_airoha_an7581_DEVICE_${DEVICE_CONFIG}=" .config || true

      - name: 下载源码
        run: |
          set -euxo pipefail
          make download -j"$(nproc)"

      - name: 编译固件
        run: |
          set -uxo pipefail
          # 先并行编;失败则单线程 verbose 重编 —— 要么竞态自愈,要么打印确切错误行
          make -j"$(nproc)" || {
            echo "==== 并行编译失败,回退 -j1 V=s 定位真因 ===="
            make -j1 V=s
          }

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ inputs.device }}
          path: |
            bin/targets/airoha/an7581/**
          if-no-files-found: error
          retention-days: 30
